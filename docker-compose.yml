services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multiagent-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
      - CHROMA_PERSIST_DIR=./data/chroma
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: multiagent-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

    # Uncomment the networks and labels sections below to expose via Traefik + Cloudflare Tunnel.
    # Replace <your-domain> with your actual public hostname.
    # Also uncomment the top-level 'networks.proxy' definition at the bottom of this file.
    # networks:
    #   - default
    #   - proxy
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=proxy"
    #   - "traefik.http.routers.mrag.rule=Host(`<your-domain>`)"
    #   - "traefik.http.routers.mrag.entrypoints=web"
    #   - "traefik.http.services.mrag.loadbalancer.server.port=80"

volumes:
  backend_data:
    driver: local

# Uncomment the block below if using Traefik + Cloudflare Tunnel (see docs/INFRA.md).
# networks:
#   proxy:
#     external: true